<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1040" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="hw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4255"/><stop offset="1" stop-color="#2b3142"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6478"/><stop offset="1" stop-color="#4a5570"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8762b"/><stop offset="1" stop-color="#d9651c"/>
    </linearGradient>
    <linearGradient id="adp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f7d8f"/><stop offset="1" stop-color="#256576"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a1f2b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1400" height="1040" fill="#f5f6f9"/>

  <!-- title -->
  <text x="60" y="58" font-size="30" font-weight="700" fill="#1c2230">OpenSpec × Robot Stack</text>
  <text x="60" y="88" font-size="17" fill="#5a6275">What the spec-driven methodology can describe — and what it physically cannot.</text>
  <line x1="60" y1="106" x2="1340" y2="106" stroke="#d6dae3" stroke-width="2"/>

  <!-- column headers -->
  <text x="60"  y="138" font-size="13" font-weight="700" fill="#8a91a3" letter-spacing="1">ROBOT STACK — 5 LAYERS</text>
  <text x="726" y="138" font-size="13" font-weight="700" fill="#8a91a3" letter-spacing="1">ADAPTER LAYER</text>
  <text x="852" y="138" font-size="13" font-weight="700" fill="#8a91a3" letter-spacing="1">OPENSPEC COVERAGE</text>
  <text x="1052" y="138" font-size="13" font-weight="700" fill="#8a91a3" letter-spacing="1">WHAT THE SPEC WOULD HOLD</text>

  <!-- ============ LAYER 5 — Mission / Cognitive ============ -->
  <g filter="url(#sh)">
    <rect x="60" y="150" width="640" height="104" rx="10" fill="url(#soft)"/>
  </g>
  <text x="84" y="186" font-size="20" font-weight="700" fill="#fff">5 · Mission / Cognitive / Fleet</text>
  <text x="84" y="212" font-size="14" fill="#ffe6d2">Task decomposition · reasoning · multi-robot coordination</text>
  <text x="84" y="236" font-size="13" fill="#ffd5b8">seconds–minutes · cloud-resident · LLM "slow brain" (System 2)</text>

  <!-- ============ LAYER 4 — Task / Skill ============ -->
  <g filter="url(#sh)">
    <rect x="60" y="268" width="640" height="104" rx="10" fill="url(#soft)"/>
  </g>
  <text x="84" y="304" font-size="20" font-weight="700" fill="#fff">4 · Task / Skill</text>
  <text x="84" y="330" font-size="14" fill="#ffe6d2">"pick the box" · "patrol zone A" · skill chaining</text>
  <text x="84" y="354" font-size="13" fill="#ffd5b8">0.1–2 Hz · onboard or cloud · workflow-shaped</text>

  <!-- ============ LAYER 3 — Mid-level planning ============ -->
  <g filter="url(#sh)">
    <rect x="60" y="386" width="640" height="104" rx="10" fill="url(#mid)"/>
  </g>
  <text x="84" y="422" font-size="20" font-weight="700" fill="#fff">3 · Mid-level Planning</text>
  <text x="84" y="448" font-size="14" fill="#dfe3ef">Navigation · manipulation planning (Nav2 · MoveIt)</text>
  <text x="84" y="472" font-size="13" fill="#c2c8da">10–100 Hz · onboard / edge · 50–300 ms budget</text>

  <!-- ============ LAYER 2 — Reactive / Reflex ============ -->
  <g filter="url(#sh)">
    <rect x="60" y="504" width="640" height="104" rx="10" fill="url(#hw)"/>
  </g>
  <text x="84" y="540" font-size="20" font-weight="700" fill="#fff">2 · Reactive / Reflex</text>
  <text x="84" y="566" font-size="14" fill="#cfd4e2">Balance · obstacle avoidance · visuomotor policy (System 1)</text>
  <text x="84" y="590" font-size="13" fill="#9aa1b5">100–500 Hz · onboard only · 1–50 ms budget</text>

  <!-- ============ LAYER 1 — Motor / Actuation ============ -->
  <g filter="url(#sh)">
    <rect x="60" y="622" width="640" height="104" rx="10" fill="url(#hw)"/>
  </g>
  <text x="84" y="658" font-size="20" font-weight="700" fill="#fff">1 · Motor / Actuation</text>
  <text x="84" y="684" font-size="14" fill="#cfd4e2">Joint torque · current control · the physical body</text>
  <text x="84" y="708" font-size="13" fill="#9aa1b5">1 kHz · onboard only · &lt;1 ms · hard real-time</text>

  <!-- abstraction / latency arrow -->
  <line x1="44" y1="160" x2="44" y2="716" stroke="#aab0c0" stroke-width="2"/>
  <polygon points="44,150 39,164 49,164" fill="#aab0c0"/>
  <polygon points="44,726 39,712 49,712" fill="#aab0c0"/>
  <text x="34" y="445" font-size="12" fill="#8a91a3" transform="rotate(-90 34 445)" text-anchor="middle">abstraction ↑   ·   network latency tolerated ↑</text>

  <!-- ============ ADAPTER LAYER (vertical strip, layers 3-5) ============ -->
  <g filter="url(#sh)">
    <rect x="720" y="150" width="86" height="340" rx="10" fill="url(#adp)"/>
  </g>
  <text x="763" y="300" font-size="15" font-weight="700" fill="#fff" transform="rotate(-90 763 300)" text-anchor="middle">ADAPTER LAYER</text>
  <text x="784" y="300" font-size="11" fill="#bfe3ea" transform="rotate(-90 784 300)" text-anchor="middle">transport · semantic · model · safety</text>
  <!-- dashed continuation showing adapters don't reach hard real-time -->
  <rect x="720" y="504" width="86" height="222" rx="10" fill="none" stroke="#9aa1b5" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="763" y="620" font-size="11" fill="#8a91a3" transform="rotate(-90 763 620)" text-anchor="middle">no network path — physics</text>

  <!-- ============ COVERAGE BADGES ============ -->
  <!-- L5 -->
  <g filter="url(#sh)"><circle cx="872" cy="202" r="30" fill="#22a06b"/></g>
  <text x="872" y="212" font-size="30" font-weight="700" fill="#fff" text-anchor="middle">✓</text>
  <text x="916" y="196" font-size="15" font-weight="700" fill="#1c2230">STRONG FIT</text>
  <text x="916" y="216" font-size="12.5" fill="#5a6275">Declarative. OpenSpec owns it.</text>

  <!-- L4 -->
  <g filter="url(#sh)"><circle cx="872" cy="320" r="30" fill="#22a06b"/></g>
  <text x="872" y="330" font-size="30" font-weight="700" fill="#fff" text-anchor="middle">✓</text>
  <text x="916" y="314" font-size="15" font-weight="700" fill="#1c2230">STRONG FIT</text>
  <text x="916" y="334" font-size="12.5" fill="#5a6275">Workflows = the OpenSpec sweet spot.</text>

  <!-- L3 -->
  <g filter="url(#sh)"><circle cx="872" cy="438" r="30" fill="#d99818"/></g>
  <text x="872" y="449" font-size="30" font-weight="700" fill="#fff" text-anchor="middle">◐</text>
  <text x="916" y="432" font-size="15" font-weight="700" fill="#1c2230">PARTIAL FIT</text>
  <text x="916" y="452" font-size="12.5" fill="#5a6275">Interfaces yes · behaviour timing no.</text>

  <!-- L2 -->
  <g filter="url(#sh)"><circle cx="872" cy="556" r="30" fill="#c44">  </circle></g>
  <text x="872" y="567" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">✕</text>
  <text x="916" y="550" font-size="15" font-weight="700" fill="#1c2230">NO FIT</text>
  <text x="916" y="570" font-size="12.5" fill="#5a6275">Real-time. Markdown cannot verify.</text>

  <!-- L1 -->
  <g filter="url(#sh)"><circle cx="872" cy="674" r="30" fill="#c44"/></g>
  <text x="872" y="685" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">✕</text>
  <text x="916" y="668" font-size="15" font-weight="700" fill="#1c2230">NO FIT</text>
  <text x="916" y="688" font-size="12.5" fill="#5a6275">URDF / control law own this.</text>

  <!-- ============ RIGHT PANEL — artefact catalogue ============ -->
  <g filter="url(#sh)">
    <rect x="1040" y="150" width="300" height="576" rx="10" fill="#fff" stroke="#e1e4ec"/>
  </g>
  <text x="1062" y="180" font-size="14" font-weight="700" fill="#1c2230">10 artefacts OpenSpec can own</text>
  <line x1="1062" y1="192" x2="1318" y2="192" stroke="#e1e4ec" stroke-width="1.5"/>
  <g font-size="12.5" fill="#3a4255">
    <text x="1062" y="222"><tspan font-weight="700">01</tspan>  Robot capability contract</text>
    <text x="1062" y="250"><tspan font-weight="700">02</tspan>  Adapter interface contract</text>
    <text x="1062" y="278"><tspan font-weight="700">03</tspan>  Integration contract (topics/srv)</text>
    <text x="1062" y="306"><tspan font-weight="700">04</tspan>  Mission / workflow spec</text>
    <text x="1062" y="334"><tspan font-weight="700">05</tspan>  Fleet coordination policy</text>
    <text x="1062" y="362"><tspan font-weight="700">06</tspan>  Operational-envelope declaration</text>
    <text x="1062" y="390"><tspan font-weight="700">07</tspan>  Deployment / config spec</text>
    <text x="1062" y="418"><tspan font-weight="700">08</tspan>  Acceptance test scenarios</text>
    <text x="1062" y="446"><tspan font-weight="700">09</tspan>  API-surface delta spec (SDK churn)</text>
    <text x="1062" y="474"><tspan font-weight="700">10</tspan>  Ecosystem capability registry</text>
  </g>
  <line x1="1062" y1="494" x2="1318" y2="494" stroke="#e1e4ec" stroke-width="1.5"/>
  <text x="1062" y="520" font-size="12.5" font-weight="700" fill="#c44">OpenSpec cannot describe</text>
  <g font-size="12" fill="#7a7f90">
    <text x="1062" y="546">— Kinematics → URDF / SDF / MJCF</text>
    <text x="1062" y="570">— Control-law correctness</text>
    <text x="1062" y="594">— Hard timing / jitter contracts</text>
    <text x="1062" y="618">— Formal safety (ISO 26262 /</text>
    <text x="1078" y="636">IEC 61508 / DO-178C → DOORS)</text>
  </g>
  <line x1="1062" y1="656" x2="1318" y2="656" stroke="#e1e4ec" stroke-width="1.5"/>
  <text x="1062" y="682" font-size="12" fill="#5a6275">Behaviour logic → Behavior Trees;</text>
  <text x="1062" y="700" font-size="12" fill="#5a6275">OpenSpec wraps &amp; references them,</text>
  <text x="1062" y="718" font-size="12" fill="#5a6275">it does not replace them.</text>

  <!-- ============ BOTTOM — the latency law ============ -->
  <g filter="url(#sh)">
    <rect x="60" y="772" width="1280" height="120" rx="10" fill="#1c2230"/>
  </g>
  <text x="86" y="808" font-size="17" font-weight="700" fill="#fff">The dividing line is the ~200 ms latency budget</text>
  <text x="86" y="838" font-size="13.5" fill="#c2c8da">OpenSpec owns the <tspan fill="#f0935a" font-weight="700">declarative upper stack</tspan> — what the robot should do, how nodes connect, what a workflow means.</text>
  <text x="86" y="860" font-size="13.5" fill="#c2c8da">It cannot own the <tspan fill="#e07a8a" font-weight="700">real-time lower stack</tspan> — how the body physically moves. Prose is not verifiable against a 1 ms deadline.</text>
  <text x="86" y="882" font-size="13.5" fill="#8a91a3">Adapters live exactly on the boundary: they translate the closed lower stack into the describable upper one. Each adapter = one capability spec.</text>

  <!-- legend -->
  <g filter="url(#sh)">
    <rect x="60" y="912" width="1280" height="104" rx="10" fill="#fff" stroke="#e1e4ec"/>
  </g>
  <text x="86" y="942" font-size="13" font-weight="700" fill="#8a91a3" letter-spacing="1">LEGEND</text>
  <circle cx="98" cy="972" r="13" fill="#22a06b"/><text x="98" y="977" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">✓</text>
  <text x="122" y="970" font-size="13" font-weight="700" fill="#1c2230">Strong fit</text>
  <text x="122" y="988" font-size="11.5" fill="#5a6275">declarative, reviewable, AI-codegen-ready</text>
  <circle cx="408" cy="972" r="13" fill="#d99818"/><text x="408" y="978" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">◐</text>
  <text x="432" y="970" font-size="13" font-weight="700" fill="#1c2230">Partial fit</text>
  <text x="432" y="988" font-size="11.5" fill="#5a6275">interface contracts yes, runtime timing no</text>
  <circle cx="742" cy="972" r="13" fill="#c44"/><text x="742" y="978" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">✕</text>
  <text x="766" y="970" font-size="13" font-weight="700" fill="#1c2230">No fit</text>
  <text x="766" y="988" font-size="11.5" fill="#5a6275">real-time / kinematics / formal safety — other tools own these</text>
  <rect x="1086" y="960" width="26" height="24" rx="5" fill="url(#adp)"/>
  <text x="1122" y="970" font-size="13" font-weight="700" fill="#1c2230">Adapter layer</text>
  <text x="1122" y="988" font-size="11.5" fill="#5a6275">the translation seam = the product</text>
</svg>
